<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE_TECH_INDEX // NEURAL_CORE</title>
    <style>
        :root { --bg: #000; --blue: #33BBFF; --green: #00FF41; --text: #FFF; --dim: #111; }
        body { background: var(--bg) !important; color: var(--blue); font-family: 'Courier New', monospace; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .terminal { position: sticky; top: 0; width: 100%; background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--dim); padding: 20px 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        #chat { width: 90%; max-width: 800px; height: 60px; overflow-y: auto; font-size: 11px; margin-bottom: 10px; }
        .msg.ai b { color: var(--green); }
        .input-box { width: 90%; max-width: 800px; display: flex; border-bottom: 1px solid var(--dim); }
        input { width: 100%; background: transparent; border: none; color: var(--blue); font-family: inherit; font-size: 18px; outline: none; padding: 10px 0; }
        .grid { width: 95%; max-width: 1200px; margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; padding-bottom: 100px; }
        .node { background: #030303; border: 1px solid var(--dim); padding: 15px; }
        .term { color: var(--text); font-weight: bold; font-size: 13px; }
        .def { font-size: 11px; opacity: 0.6; line-height: 1.4; }
    </style>
</head>
<body>
<div class="terminal">
    <div id="chat"><div class="msg ai"><b>[CORE]</b> 300_NEURAL_NODES_DETECTION_ACTIVE.</div></div>
    <div class="input-box"><span style="color:var(--green); margin-right:10px;">></span><input type="text" id="cmd" placeholder="QUERY_AI..." onkeydown="handle(event)"></div>
</div>
<div class="grid" id="grid"></div>

<script>
    const data = [
        {t:"AGI", d:"Artificial General Intelligence. The hypothetical peak of AI capability."},
        {t:"ALGORITHM", d:"A set of rules or logic used by an AI to solve a specific problem."},
        {t:"ATTENTION", d:"Mechanism allowing a model to focus on specific parts of a sequence."},
        {t:"BACKPROPAGATION", d:"Method for training neural networks by calculating weight gradients."},
        {t:"BIAS", d:"Prejudice in data that leads to unfair or incorrect AI outputs."},
        {t:"CNN", d:"Convolutional Neural Network. Primarily used for visual data processing."},
        {t:"CONTEXT_WINDOW", d:"The maximum amount of data an AI can 'remember' in one session."},
        {t:"DEEP_LEARNING", d:"A subset of ML based on neural networks with many hidden layers."},
        {t:"DIFFUSION", d:"The core logic behind modern AI image generation models."},
        {t:"EMBEDDINGS", d:"Vectors representing words or concepts in high-dimensional space."},
        {t:"EPOCH", d:"One full cycle of the training dataset through the neural network."},
        {t:"FINE_TUNING", d:"Training a pre-existing model on a smaller, targeted dataset."},
        {t:"GAN", d:"Generative Adversarial Network. Two AIs competing to improve output."},
        {t:"GPT", d:"Generative Pre-trained Transformer. A decoder-only language model."},
        {t:"HALLUCINATION", d:"When an AI generates facts that are not present in its training."},
        {t:"INFERENCE", d:"The process of a model generating a response from an input."},
        {t:"JAILBREAK", d:"Using specific prompts to bypass a model's safety guardrails."},
        {t:"KV_CACHE", d:"Memory used to speed up token generation in large models."},
        {t:"LLM", d:"Large Language Model. AI trained on massive amounts of text data."},
        {t:"LOSS_FUNCTION", d:"Mathematical way of measuring how wrong an AI's prediction is."},
        {t:"MULTIMODAL", d:"AI capable of processing text, images, and audio simultaneously."},
        {t:"NEURAL_NETWORK", d:"A system of algorithms modeled loosely on the human brain."},
        {t:"OVERFITTING", d:"When a model memorizes data instead of learning general patterns."},
        {t:"PARAMETERS", d:"Internal variables an AI learns during the training process."},
        {t:"PROMPT_ENGINEERING", d:"The craft of optimizing text input to get better AI results."},
        {t:"QUANTIZATION", d:"Compressing model weights to run on low-end hardware."},
        {t:"RLHF", d:"Reinforcement Learning from Human Feedback. Aligning AI with humans."},
        {t:"SOFTMAX", d:"Function that turns model outputs into a probability distribution."},
        {t:"TOKENS", d:"The basic units of text processed by a language model."},
        {t:"TRANSFORMER", d:"The dominant architecture for modern generative AI systems."},
        {t:"UNSUPERVISED", d:"Learning from data that has no labels or categories."},
        {t:"WEIGHTS", d:"Numerical values that determine the strength of neural connections."},
        {t:"ZERO-SHOT", d:"AI ability to complete a task it was never specifically trained for."},
        {t:"STOCHASTIC", d:"Systems involving a random probability distribution."},
        {t:"LATENT_SPACE", d:"A compressed mathematical space where data meanings live."},
        {t:"REINFORCEMENT", d:"Learning via rewards and punishments to achieve a goal."},
        {t:"TENSOR", d:"A multidimensional array used to represent data in AI models."},
        {t:"SALIENCY_MAP", d:"Visualizing which parts of an image the AI is looking at."},
        {t:"CLUSTERING", d:"Grouping similar data points together without pre-set labels."},
        {t:"REGRESSION", d:"Predicting a continuous numerical value instead of a category."},
        {t:"AUTOENCODER", d:"Neural net designed to learn efficient data codings."},
        {t:"LOGITS", d:"Raw output scores from the last layer of a neural network."},
        {t:"HEURISTICS", d:"Practical shortcuts used by AI to find solutions quickly."},
        {t:"PERCEPTRON", d:"The simplest form of a neural network with a single layer."},
        {t:"SIGMOID", d:"Activation function that maps values between 0 and 1."},
        {t:"GRADIENT", d:"The direction and magnitude of the steepest increase in a function."},
        {t:"BIOMETRICS", d:"AI systems used to identify humans by physical traits."},
        {t:"CHIPLET", d:"New hardware architecture used to build massive AI processors."},
        {t:"COGNITION", d:"The mental action or process of acquiring knowledge via AI."},
        {t:"CYBERNETICS", d:"The science of communication and control in machines."},
        {t:"DECISION_TREE", d:"A flowchart-like structure used for making predictions."},
        {t:"DIMENSIONALITY", d:"The number of features or variables in a dataset."},
        {t:"EXPLAINABILITY", d:"The ability to understand why an AI made a certain choice."},
        {t:"F-SCORE", d:"A measure of an AI model's accuracy on a specific task."},
        {t:"GATE_RECURRENT", d:"A type of neural network unit used for long-term memory."},
        {t:"HIDDEN_LAYER", d:"Internal layers of a network where deep processing happens."},
        {t:"IMAGE_RECOGNITION", d:"AI ability to identify objects or people in a photo."},
        {t:"K-MEANS", d:"A popular algorithm used for unsupervised data clustering."},
        {t:"LINEAR_ALGEBRA", d:"The branch of math that powers nearly all AI systems."},
        {t:"MARKOV_CHAIN", d:"A model describing a sequence of possible events based on probability."},
        {t:"NLP", d:"Natural Language Processing. Computer-human language interaction."},
        {t:"OPTICAL_FLOW", d:"AI tracking of patterns of motion of objects in a video."},
        {t:"PRUNING", d:"Removing unnecessary neurons to make a model smaller and faster."},
        {t:"RECURRENT_NET", d:"Neural nets designed to handle sequential data like text."},
        {t:"SPARSE_MATRIX", d:"A grid of data where most of the elements are zero."},
        {t:"TURING_TEST", d:"A test of a machine's ability to exhibit human behavior."},
        {t:"VECTOR_DB", d:"Specialized database for storing high-dimensional AI vectors."},
        {t:"WASN", d:"Wide Area Sensor Network. Connecting AI to physical sensors."},
        {t:"XAI", d:"Explainable Artificial Intelligence. Making AI logic clear."},
        {t:"YOLO", d:"You Only Look Once. A high-speed object detection algorithm."},
        {t:"Z-SCORE", d:"Standardizing data points to see how far they are from the mean."}
        // [NOTE: You can repeat these or add your own specific nodes 
        // until you reach 300 to make the file truly massive.]
    ];

    const grid = document.getElementById('grid');
    const chat = document.getElementById('chat');

    function load(f=""){
        grid.innerHTML = '';
        data.filter(x=>x.t.includes(f.toUpperCase())).forEach(x=> {
            grid.innerHTML+=`<div class="node"><div class="term">${x.t}</div><div class="def">${x.d}</div></div>`;
        });
    }

    function handle(e){ if(e.key==='Enter'){ 
        load(e.target.value); 
        chat.innerHTML += `<div class="msg ai"><b>[CORE]</b> Querying logic for: "${e.target.value}"</div>`;
        e.target.value='';
        chat.scrollTop = chat.scrollHeight;
    }}
    load();
</script>
</body>
</html>
