<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE_TECH_INDEX // NEURAL_DIRECT</title>
    <style>
        :root { --bg: #000; --blue: #33BBFF; --green: #00FF41; --text: #FFF; --dim: #111; --user-bg: #111; --ai-bg: #000810; }
        body { background: var(--bg) !important; color: var(--blue); font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .hud { width: 100%; padding: 10px 20px; border-bottom: 1px solid var(--dim); display: flex; justify-content: space-between; font-size: 9px; color: var(--green); background: #000; }
        #chat-flow { flex-grow: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }

        .bubble { max-width: 90%; padding: 18px 25px; border-radius: 22px; font-size: 15px; line-height: 1.6; animation: emerge 0.3s ease; white-space: pre-wrap; }
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; border: 1px solid #222; }
        .ai { align-self: flex-start; background: var(--ai-bg); color: var(--blue); border-bottom-left-radius: 4px; border: 1px solid #002b4d; box-shadow: 0 0 20px rgba(51, 187, 255, 0.1); }
        .ai b { color: var(--green); display: block; margin-bottom: 8px; font-size: 10px; letter-spacing: 2px; }

        .code-box { background: #050505; color: var(--green); padding: 20px; border-radius: 12px; font-family: 'Consolas', monospace; font-size: 12px; border: 1px solid #111; margin-top: 15px; display: block; overflow-x: auto; max-height: 500px; line-height: 1.5; }

        #typing { align-self: flex-start; display: none; margin-left: 20px; padding: 15px; }
        .dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; display: inline-block; animation: wave 1.3s infinite ease-in-out; margin-right: 4px; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        .input-area { padding: 40px; background: #000; border-top: 1px solid var(--dim); display: flex; justify-content: center; }
        .input-shield { width: 100%; max-width: 950px; background: #080808; border: 1px solid var(--dim); border-radius: 40px; padding: 15px 30px; display: flex; align-items: center; }
        input { width: 100%; background: transparent; border: none; color: #fff; outline: none; font-size: 17px; }

        @keyframes emerge { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes wave { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-7px); } }
    </style>
</head>
<body>

<div class="hud"><span>CORE: v103_DIRECT</span><span>INTENT_MAPPING: ACTIVE</span><span>MODE: FULL_GEN</span></div>

<div id="chat-flow">
    <div class="bubble ai"><b>[GEMINI_ULTRA]</b> Neural blockages cleared. I am ready to dump full code blocks. What are we building?</div>
</div>

<div id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

<div class="input-area">
    <div class="input-shield">
        <input type="text" id="omni-in" placeholder="Say 'Write the code for Tetris'..." autocomplete="off" onkeydown="process(event)">
    </div>
</div>

<script>
    const flow = document.getElementById('chat-flow');
    const typing = document.getElementById('typing');

    function process(e) {
        if (e.key === 'Enter' && e.target.value.trim() !== "") {
            const val = e.target.value;
            const q = val.toLowerCase().trim();
            
            flow.innerHTML += `<div class="bubble user">${val}</div>`;
            e.target.value = '';
            flow.scrollTop = flow.scrollHeight;

            typing.style.display = 'block';
            flow.scrollTop = flow.scrollHeight;

            setTimeout(() => {
                typing.style.display = 'none';
                let res = "";

                // --- THE "DO IT" TRIGGER ---
                const triggerAction = q.includes("write") || q.includes("give") || q.includes("block") || q.includes("full");

                if (q.includes("tetris") && triggerAction) {
                    res = "Acknowledged. Deploying the full Tetris Engine block:\n<div class='code-box'>// FULL TETRIS ENGINE\nconst canvas = document.getElementById('tetris');\nconst ctx = canvas.getContext('2d');\nconst ROW = 20, COL = 10, SQ = 30;\n\n// Piece Definitions\nconst PIECES = [[[[1,1,1,1]],[[1],[1],[1],[1]]], /* and so on... */];\n\nclass Piece {\n  constructor(pattern, color) {\n    this.pattern = pattern;\n    this.color = color;\n    this.x = 3; this.y = -2;\n  }\n  draw() {\n    this.pattern.forEach((row, i) => {\n      row.forEach((value, j) => {\n        if(value) fillSquare(this.x + j, this.y + i, this.color);\n      });\n    });\n  }\n  moveDown() {\n    if(!this.collision(0,1)) { this.y++; } else { this.lock(); }\n  }\n  rotate() {\n    let next = this.pattern[0].map((_, i) => this.pattern.map(row => row[i]).reverse());\n    if(!this.collision(0,0,next)) this.pattern = next;\n  }\n}\n\nfunction gameLoop() {\n  now = Date.now();\n  if(now - dropStart > 1000) {\n    activePiece.moveDown();\n    dropStart = now;\n  }\n  requestAnimationFrame(gameLoop);\n}</div>";
                } 
                else if (q.includes("2048") && triggerAction) {
                    res = "Deploying full 2048 Logic Engine:\n<div class='code-box'>class Game2048 {\n  setup() {\n    this.grid = Array(16).fill(0);\n    this.addTile(); this.addTile();\n  }\n  slide(row) {\n    let arr = row.filter(val => val);\n    for (let i = 0; i < arr.length - 1; i++) {\n      if (arr[i] === arr[i + 1]) {\n        arr[i] *= 2; arr[i + 1] = 0;\n      }\n    }\n    return arr.filter(val => val).concat(Array(4 - arr.length).fill(0));\n  }\n}</div>";
                }
                else {
                    res = "Direct command not recognized. Please specify: 'Write the code for [Project Name]'.";
                }

                flow.innerHTML += `<div class="bubble ai"><b>[GEMINI_ULTRA]</b> ${res}</div>`;
                flow.scrollTop = flow.scrollHeight;
            }, 1000);
        }
    }
</script>
</body>
</html>
