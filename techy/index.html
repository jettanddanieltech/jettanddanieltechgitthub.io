<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE_TECH_INDEX // NEURAL_CORE</title>
    <style>
        :root { --bg: #000; --blue: #33BBFF; --green: #00FF41; --text: #FFF; --dim: #111; }
        body { background: var(--bg) !important; color: var(--blue); font-family: 'Courier New', monospace; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* PERSISTENT CONVERSATION TERMINAL */
        .terminal { position: sticky; top: 0; width: 100%; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--dim); padding: 20px 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        #chat { width: 90%; max-width: 800px; height: 60px; overflow-y: auto; font-size: 12px; margin-bottom: 10px; }
        .msg { margin-bottom: 4px; }
        .msg.ai b { color: var(--green); margin-right: 8px; }
        .input-box { width: 90%; max-width: 800px; display: flex; align-items: center; border-bottom: 1px solid var(--dim); }
        input { width: 100%; background: transparent; border: none; color: var(--blue); font-family: inherit; font-size: 18px; outline: none; padding: 10px 0; }

        /* THE GRID */
        .grid { width: 95%; max-width: 1200px; margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; padding-bottom: 100px; }
        .node { background: #020202; border: 1px solid var(--dim); padding: 15px; display: flex; flex-direction: column; }
        .node:hover { border-color: var(--blue); }
        .term { color: var(--text); font-weight: bold; font-size: 13px; margin-bottom: 5px; }
        .def { font-size: 11px; opacity: 0.7; line-height: 1.4; }
    </style>
</head>
<body>

<div class="terminal">
    <div id="chat"><div class="msg ai"><b>[CORE]</b> AI_DATABASE_LOADED. 250+ Neural Nodes Syncing...</div></div>
    <div class="input-box">
        <span style="color:var(--green); margin-right:10px;">></span>
        <input type="text" id="cmd" placeholder="QUERY_AI_LOGIC..." onkeydown="handle(event)">
    </div>
</div>

<div class="grid" id="grid">
    </div>

<script>
    const data = [
        { t: "AGI", d: "Artificial General Intelligence. AI that matches human cognition." },
        { t: "BACKPROPAGATION", d: "Fundamental algorithm for training neural networks via gradients." },
        { t: "CNN", d: "Convolutional Neural Network. Specialized for visual pattern recognition." },
        { t: "DIFFUSION", d: "Generative logic used to create high-fidelity images from noise." },
        { t: "EMBEDDINGS", d: "Vector representations of text captured in high-dimensional space." },
        // ... Repeat or add more to reach 250+
    ];

    const grid = document.getElementById('grid');
    const chat = document.getElementById('chat');

    function loadEntries(filter = "") {
        grid.innerHTML = '';
        data.forEach(item => {
            if (item.t.toLowerCase().includes(filter) || item.d.toLowerCase().includes(filter)) {
                grid.innerHTML += `<div class="node"><div class="term">${item.t}</div><div class="def">${item.d}</div></div>`;
            }
        });
    }

    function handle(e) {
        if (e.key === 'Enter') {
            let val = e.target.value;
            chat.innerHTML += `<div class="msg user" style="color:#333;">[USER] ${val}</div>`;
            loadEntries(val.toLowerCase());
            chat.innerHTML += `<div class="msg ai"><b>[CORE]</b> Filtering archive for: "${val}"</div>`;
            e.target.value = '';
            chat.scrollTop = chat.scrollHeight;
        }
    }

    loadEntries();
</script>
</body>
</html>
