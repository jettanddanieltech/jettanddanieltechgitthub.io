<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>J&D | Software Studio</title>
    <style>
        :root {
            --neon-green: #00FF88;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding-top: 100px;
            text-align: center;
        }

        /* Navigation Bar */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--neon-green);
            display: flex;
            justify-content: center;
            padding: 15px 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a:hover {
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
        }

        h1 {
            color: var(--neon-green);
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid #333;
            text-align: left;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin-bottom: 15px;
            font-size: 1.1rem;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        li::before {
            content: "CODE_ ";
            color: var(--neon-green);
            font-weight: bold;
        }

        .status-bar {
            margin-top: 20px;
            font-family: monospace;
            color: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <nav>
