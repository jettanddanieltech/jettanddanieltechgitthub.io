<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>J&D | Chat with Techy</title>
    <style>
        /* Force everything to show up with bright colors */
        body { 
            background-color: #000000 !important; 
            color: #00FF88 !important; 
            font-family: monospace; 
            margin: 0; 
            padding: 20px;
        }
        nav { 
            padding: 15px; 
            border-bottom: 2px solid #33BBFF; 
            margin-bottom: 30px; 
            text-align: center;
        }
        nav a { 
            color: #33BBFF; 
            text-decoration: none; 
            margin: 0 10px; 
            font-weight: bold;
            font-size: 14px;
        }
        .chat-area { 
            border: 1px solid #33BBFF; 
            background: #0a0a0a;
            height: 350px; 
            padding: 15px; 
            overflow-y: auto; 
            margin-bottom: 20px;
        }
        .bot-text { color: #33BBFF; margin-bottom: 10px; }
        .user-text { color: #00FF88; margin-bottom: 10px; }
        
        input { 
            width: 95%; 
            padding: 15px; 
            background: #111; 
            border: 2px solid #00FF88; 
            color: #00FF88; 
            font-size: 16px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="hardware.html">HARDWARE</a>
        <a href="software.html">SOFTWARE</a>
        <a href="dictionary.html">DICTIONARY</a>
        <a href="techy.html">TECHY AI</a>
    </nav>

    <h1 style="color:#33BBFF">TECHY AI v2.5</h1>
    
    <div class="chat-area" id="logs">
        <div class="bot-text">>> [SYSTEM ONLINE]</div>
        <div class="bot-text">>> I am Techy. Ask me about Jett, Daniel, or our tech services.</div>
    </div>

    <input type="text" id="userInput" placeholder="Type here and press Enter..." onkeypress="if(event.key==='Enter') runChat()">

    <script>
        function runChat() {
            var box = document.getElementById('userInput');
            var log = document.getElementById('logs');
            var msg = box.value.toLowerCase();
            
            if(!msg) return;

            // Show User Message
            log.innerHTML += "<div class='user-text'>> " + box.value + "</div>";
            
            // Logic
            var reply = "I'm not programmed for that yet. Ask about Jett or Daniel!";
            
            if(msg.includes("jett")) reply = "Jett is the Software expert. He builds websites and fixes code.";
            if(msg.includes("daniel")) reply = "Daniel is the Hardware lead. He builds gaming PCs and fixes parts.";
            if(msg.includes("hi") || msg.includes("hello")) reply = "System active. How can I help you today?";
            if(msg.includes("hardware")) reply = "Daniel handles all hardware. Check the Hardware page for more!";
            if(msg.includes("software")) reply = "Jett handles all web projects. Check the Software page for more!";

            // Response delay
            setTimeout(function() {
                log.innerHTML += "<div class='bot-text'>>> " + reply + "</div>";
                log.scrollTop = log.scrollHeight;
            }, 300);

            box.value = "";
        }
    </script>

</body>
</html>
