<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JETTANDDANIELTECH // HUB</title>
    <style>
        :root {
            --bg: #020202;
            --panel: #080808;
            --cyan: #00d2ff;
            --border: #151515;
            --mono: 'Courier New', monospace;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: #eee;
            font-family: var(--mono);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* TOP NAVIGATION */
        nav {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 20px 50px;
            display: flex;
            justify-content: flex-end; /* Pushes links to the right */
            align-items: center;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #555;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--cyan);
            text-shadow: 0 0 8px var(--cyan);
        }

        /* MAIN CENTER CONTENT */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo-container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .main-logo-img {
            width: 100%;
            height: auto;
            max-width: 500px;
            /* Subtle glow effect to match the logo style */
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.2));
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.02); opacity: 1; }
        }

        /* SCANLINE / CRT EFFECT */
        .hero::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* BACKGROUND DECORATION */
        .bg-text {
            position: absolute;
            font-size: 0.5rem;
            color: #0a0a0a;
            user-select: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="hardware">HARDWARE</a>
            <a href="software">SOFTWARE</a>
            <a href="techy">TECHY</a>
            <a href="dictionary">DICTIONARY</a>
            <a href="tutorials">TUTORIALS</a>
        </div>
    </nav>

    <div class="hero">
        <div class="logo-container">
            <img src="logo.png" alt="JETTANDDANIELTECH" class="main-logo-img">
        </div>
    </div>

</body>
</html>
