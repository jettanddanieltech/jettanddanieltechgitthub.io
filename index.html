<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHTORIALS // MAIN_CORE</title>
    <style>
        :root {
            --bg: #000;
            --blue: #33BBFF;
            --green: #00FF41;
        }

        body { 
            background: var(--bg); 
            color: var(--blue); 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* Branding */
        .logo-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-main {
            font-size: 90px;
            font-weight: 900;
            line-height: 0.7;
            transform: skewX(-15deg);
            margin: 0;
        }

        .logo-sub {
            font-size: 35px;
            font-weight: 300;
            letter-spacing: 16px;
            margin-top: 5px;
            color: var(--blue);
            transform: skewX(-15deg);
        }

        /* Navigation Grid */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 280px);
            gap: 20px;
        }

        .nav-item {
            border: 1px solid var(--blue);
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: var(--blue);
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            transition: 0.3s ease;
            background: rgba(51, 187, 255, 0.02);
        }

        .nav-item:hover {
            background: var(--blue);
            color: #000;
            box-shadow: 0 0 25px var(--blue);
            transform: translateY(-3px);
        }

        /* System Info */
        .system-footer {
            margin-top: 60px;
            color: var(--green);
            font-size: 12px;
            text-align: center;
            line-height: 1.5;
        }

        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        @media (max-width: 600px) {
            .nav-grid { grid-template-columns: 1fr; width: 90%; }
            .logo-main { font-size: 60px; }
            .logo-sub { font-size: 20px; letter-spacing: 8px; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <h1 class="logo-main">TECH</h1>
        <div class="logo-sub">TORIALS</div>
    </div>

    <div class="nav-grid">
        <a href="/tutorials" class="nav-item">REPAIR_PROTOCOLS</a>
        <a href="/software" class="nav-item">SOFTWARE_REPO</a>
        <a href="/techy" class="nav-item">AI_DATABASE</a>
        <a href="/dictionary" class="nav-item">TECH_DICTIONARY</a>
    </div>

    <div class="system-footer">
        <span class="blink">></span> SYSTEM_STATUS: ONLINE<br>
        <span style="color:#555;">JD_OS_v4.2.0_STABLE</span>
    </div>

</body>
</html>
