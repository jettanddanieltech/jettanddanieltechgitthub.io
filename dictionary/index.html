        function render(data) {
            const list = document.getElementById('dict-list');
            list.innerHTML = data.map(item => `
                <div class="entry">
                    <div class="entry-word">${item.w}</div>
                    <div class="entry-def">${item.d}</div>
                </div>
            `).join('');
            document.getElementById('term-count').innerText = `TERMS_LOADED: ${data.length}`;
        }

        function search() {
            const query = document.getElementById('search-input').value.toUpperCase();
            const filtered = JDT_DATABASE.filter(item => 
                item.w.includes(query) || item.d.toUpperCase().includes(query)
            );
            render(filtered);
        }

        render(JDT_DATABASE);
    </script>
